name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  simulate:
    name: GHDL unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GHDL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ghdl

      - name: Expose program.mem at repo root
        run: ln -s programs/program.mem program.mem

      - name: Run unit tests
        run: make ci
